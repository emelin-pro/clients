<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1BA1FA;
      --primary-dark: #0B7FD4;
      --primary-light: #E8F5FE;
      --primary-glow: rgba(27, 161, 250, 0.15);
      --green: #10B981;
      --green-light: #ECFDF5;
      --green-dark: #059669;
      --amber: #F59E0B;
      --amber-light: #FEF3C7;
      --surface: #FFFFFF;
      --bg: #F3F6FA;
      --bg-subtle: #EDF1F7;
      --text-primary: #0F1729;
      --text-secondary: #4B5C72;
      --text-muted: #8896A8;
      --border: #E2E8F0;
      --border-light: #F0F4F8;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-xl: 36px;
      --shadow-sm: 0 1px 3px rgba(0,20,50,0.04);
      --shadow-md: 0 8px 24px -8px rgba(0,20,50,0.08);
      --shadow-lg: 0 20px 40px -12px rgba(0,20,50,0.12);
      --shadow-glow: 0 0 0 4px var(--primary-glow);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .brand-bar {
      max-width: 1200px;
      margin: 0 auto 20px;
      padding: 0 4px;
      animation: fadeDown 0.5s ease-out;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-logo img {
      height: 32px;
      width: auto;
      max-width: 200px;
    }

    .brand-logo-text {
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.03em;
      color: var(--primary);
      display: none;
    }

    .case-card {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: fadeUp 0.6s ease-out;
      position: relative;
    }

    .case-sticky-header {
      padding: 32px 32px 0;
      transition: box-shadow 0.25s, padding 0.25s;
      background: var(--surface);
      z-index: 10;
    }

    .case-sticky-header.is-sticky { position: sticky; top: 0; }
    .case-sticky-header.stuck { 
      padding: 16px 32px; 
      box-shadow: 0 4px 20px -4px rgba(0,20,50,0.1); 
      border-bottom: 1px solid var(--border-light);
    }

    .client-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary-dark);
      background: var(--primary-light);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }

    .case-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .header-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .case-title {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1.25;
      flex: 1;
    }

    /* Куратор всегда видим */
    .coordinator-visible {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      flex-shrink: 0;
    }

    .coordinator-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #50C3FF);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .coordinator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .coordinator-info {
      display: flex;
      flex-direction: column;
    }

    .coordinator-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .coordinator-contacts {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .contact-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
    }

    .contact-icon:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .contact-icon svg {
      width: 12px;
      height: 12px;
    }

    .message-btn {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      margin-left: 4px;
    }
    .message-btn:hover {
      background: var(--primary-dark);
    }

    /* Плашка ожиданий */
    .expectation-banner {
      background: var(--amber-light);
      border-left: 4px solid var(--amber);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin: 0 32px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: slideDown 0.3s ease-out;
    }

    .expectation-icon {
      font-size: 1.5rem;
    }

    .expectation-content {
      flex: 1;
    }

    .expectation-title {
      font-weight: 700;
      color: var(--text-primary);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .expectation-text {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .progress-overview {
      margin: 0 32px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .progress-percent {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .progress-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .progress-track {
      margin: 0 32px 32px;
      height: 6px;
      background: var(--bg-subtle);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--green), var(--primary));
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .stages-section { padding: 0 32px 32px; }

    /* Horizontal stages */
    .stages-horizontal {
      display: flex;
      gap: 12px;
    }

    .stage-card-h {
      flex: 1 1 0;
      min-width: 0;
      border-radius: var(--radius-md);
      padding: 20px 16px 16px;
      border: 2px solid transparent;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transition: all 0.25s ease;
    }

    .stage-card-h.active {
      background: var(--primary-light);
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
    }

    .stage-card-h.pending { background: var(--bg); }

    .stage-number {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .completed .stage-number { background: var(--green); color: white; }
    .active .stage-number { background: var(--primary); color: white; }
    .pending .stage-number { background: var(--border); color: var(--text-muted); }

    .stage-title-h {
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .stage-value {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-style: italic;
    }

    .stage-status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
      align-self: flex-start;
    }

    .completed .stage-status-badge { background: rgba(16,185,129,0.15); color: var(--green-dark); }
    .active .stage-status-badge { background: rgba(27,161,250,0.15); color: var(--primary-dark); }
    .pending .stage-status-badge { background: var(--border-light); color: var(--text-muted); }

    /* Индикатор ответственности */
    .responsibility-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--bg);
    }
    .responsibility-client {
      background: var(--amber-light);
      color: var(--amber);
    }
    .responsibility-expert {
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    .stage-details-h {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(0,0,0,0.06);
      font-size: 0.83rem;
      color: var(--text-secondary);
      line-height: 1.5;
      flex-grow: 1;
    }

    .stage-details-h ul, .stage-details-h ol {
      padding-left: 20px;
      margin: 8px 0;
    }
    .stage-details-h strong { font-weight: 700; color: var(--text-primary); }
    .stage-details-h em { font-style: italic; }

    .stage-footer-h {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .date-info {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--primary-dark);
    }

    .date-info svg { width: 14px; height: 14px; }

    .materials-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .materials-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--primary-light);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: var(--primary-dark);
      text-decoration: none;
      border: 1px solid var(--primary);
      align-self: flex-start;
    }
    .materials-link:hover { background: var(--primary); color: white; }

    .client-materials {
      background: var(--amber-light);
      border-color: var(--amber);
    }

    /* Vertical stages */
    .stages-vertical {
      display: none;
      flex-direction: column;
      position: relative;
      padding-left: 44px;
    }

    .stages-vertical::before {
      content: '';
      position: absolute;
      left: 21px; top: 24px; bottom: 24px;
      width: 2px;
      background: var(--border);
      border-radius: 2px;
    }

    .stage-v { position: relative; padding: 12px 0; }

    .stage-v .stage-number {
      position: absolute;
      left: -44px; top: 12px;
      width: 42px; height: 42px;
      font-size: 0.95rem; z-index: 2;
    }

    .stage-v-body {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      border: 2px solid transparent;
    }

    .stage-v.active .stage-v-body {
      background: var(--primary-light);
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
    }

    .stage-v.pending .stage-v-body { background: var(--bg); }

    .stage-v-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .stage-v-title { font-weight: 700; font-size: 1.05rem; order: 2; }
    .stage-v-header .stage-status-badge { order: 1; }

    .stage-v-value {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 8px;
    }

    .stage-v-details {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px dashed rgba(0,0,0,0.08);
      font-size: 0.88rem; color: var(--text-secondary);
      line-height: 1.55; display: block;
    }

    .stage-v-footer {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .case-footer {
      padding: 0 32px 28px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
    }

    .footer-update {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .update-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      font-size: 1.1rem;
    }

    .refresh-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: rotate(180deg);
    }

    /* Mobile */
    @media (max-width: 768px) {
      body { padding: 12px 8px; }
      .brand-bar { margin-bottom: 12px; }
      .stages-horizontal { display: none; }
      .stages-vertical { display: flex; }
      .case-sticky-header { padding: 20px 20px 0; }
      .case-sticky-header.stuck { padding: 12px 20px; }
      .progress-overview { margin: 0 20px 16px; }
      .progress-track { margin: 0 20px 24px; }
      .stages-section { padding: 0 20px 24px; }
      .case-footer { padding: 0 20px 24px; }
      .header-top-row { flex-direction: column; align-items: flex-start; }
      .case-title { font-size: 1.3rem; }
      .progress-percent { font-size: 1.8rem; }
      .coordinator-visible { align-self: flex-start; margin-top: 8px; }
      .expectation-banner { margin: 0 20px 20px; }
    }

    /* Scrollable */
    .stages-horizontal.scrollable {
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
    }
    .stages-horizontal.scrollable .stage-card-h { flex: 0 0 260px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes stageEnter { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .stage-animate { animation: stageEnter 0.4s ease-out both; }
    .flash-update { animation: flashBorder 1.5s ease-out; }
    @keyframes flashBorder {
      0% { box-shadow: 0 0 0 0 rgba(27,161,250,0.5); }
      70% { box-shadow: 0 0 0 8px rgba(27,161,250,0); }
      100% { box-shadow: none; }
    }
  </style>
</head>

  function statusText(s) {

  function getInitials(n) { return n ? n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?'; }

  function countWorkingDays(start, end) {
    if (!start || !end) return null;
    const startDate = new Date(start + 'T00:00:00');
    const endDate = new Date(end + 'T23:59:59');
    if (startDate > endDate) return 0;
    let count = 0;
    const current = new Date(startDate);
    while (current <= endDate) {
      const day = current.getDay();
      if (day !== 0 && day !== 6) count++;
      current.setDate(current.getDate() + 1);
    }
    return count;
  }

  function elapsedWorkingDays(start) {
    if (!start) return null;
    const startDate = new Date(start + 'T00:00:00');
    const today = new Date();
    today.setHours(0,0,0,0);
    if (today < startDate) return 0;
    let count = 0;
    const current = new Date(startDate);
    while (current <= today) {
      const day = current.getDay();
      if (day !== 0 && day !== 6) count++;
      current.setDate(current.getDate() + 1);
    }
    return count;
  }

  function remainingWorkingDays(end) {
    if (!end) return null;
    const endDate = new Date(end + 'T23:59:59');
    const today = new Date();
    today.setHours(0,0,0,0);
    if (today > endDate) return 0;
    let count = 0;
    const current = new Date(today);
    while (current <= endDate) {
      const day = current.getDay();
      if (day !== 0 && day !== 6) count++;
      current.setDate(current.getDate() + 1);
    }
    return count;
  }

  function getOverallProgress(stages) {
    const dates = stages.reduce((acc, s) => {
      if (s.startDate) acc.push(new Date(s.startDate));
      if (s.endDate) acc.push(new Date(s.endDate));
      return acc;
    }, []);
    if (dates.length === 0) return 0;
    const start = new Date(Math.min(...dates));
    const end = new Date(Math.max(...dates));
    const today = new Date();
    if (today < start) return 0;
    if (today > end) return 100;
    const total = end - start;
    const elapsed = today - start;
    return Math.round((elapsed / total) * 100);
  }

  function formatText(text) {
    if (!text) return '';
    let escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    
    const ulRegex = /(?:^|\n)- (.+?)(?=\n- |\n\n|$)/g;
    escaped = escaped.replace(ulRegex, (match, p1) => {
      const items = match.split('\n').map(line => {
        const itemMatch = line.match(/^- (.+)$/);
        return itemMatch ? itemMatch[1] : line;
      });
      return '<ul>' + items.map(item => `<li>${item}</li>`).join('') + '</ul>';
    });
    
    const olRegex = /(?:^|\n)\d+\. (.+?)(?=\n\d+\. |\n\n|$)/g;
    escaped = escaped.replace(olRegex, (match, p1) => {
      const items = match.split('\n').map(line => {
        const itemMatch = line.match(/^\d+\. (.+)$/);
        return itemMatch ? itemMatch[1] : line;
      });
      return '<ol>' + items.map(item => `<li>${item}</li>`).join('') + '</ol>';
    });
    
    escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    escaped = escaped.replace(/\*(.+?)\*/g, '<em>$1</em>');
    escaped = escaped.replace(/\n/g, '<br>');
    
    return escaped;
  }

  function formatDateRange(start, end) {
    if (!start || !end) return '';
    const startDate = new Date(start + 'T00:00:00');
    const endDate = new Date(end + 'T23:59:59');
    const startDay = startDate.getDate().toString().padStart(2,'0');
    const startMonth = (startDate.getMonth()+1).toString().padStart(2,'0');
    const startYear = startDate.getFullYear();
    const endDay = endDate.getDate().toString().padStart(2,'0');
    const endMonth = (endDate.getMonth()+1).toString().padStart(2,'0');
    const endYear = endDate.getFullYear();

    if (startYear !== endYear) {
      return `${startDay}.${startMonth}.${startYear} - ${endDay}.${endMonth}.${endYear}`;
    } else {
      return `${startDay}.${startMonth} - ${endDay}.${endMonth}.${endYear}`;
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDate().toString().padStart(2,'0');
    const month = (d.getMonth()+1).toString().padStart(2,'0');
    const year = d.getFullYear();
    return `${day}.${month}.${year}`;
  }

      // Индикатор ответственности

        `<span class="responsibility-indicator ${responsibilityClass}">● ${responsibilityText}</span>` : '';

        `<div class="stage-value">✨ ${s.value_proposition}</div>` : '';

        dateHtml = `<div class="date-info">${clockSvg} ${formatDateRange(s.startDate, s.endDate)}</div>`;

        const totalDays = countWorkingDays(s.startDate, s.endDate);

        const remaining = remainingWorkingDays(s.endDate);
        
        if (totalDays !== null && elapsed !== null && remaining !== null) {
          const remainingText = remaining === 0 ? 'сегодня' : `осталось ${remaining} рабочих дней`;
          
          // Прогноз даты

          const forecastStr = forecastDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

      el.innerHTML = `

  function hashData(d) { return JSON.stringify(d.stages?.map(s => s.status)); }

  async function fetchAndRender() {
    const data = await loadData();
    const h = hashData(data);
    if (lastDataHash && h !== lastDataHash) {
      document.getElementById('caseCard').classList.add('flash-update');
      setTimeout(() => document.getElementById('caseCard').classList.remove('flash-update'), 1500);
    }
    lastDataHash = h;
    render(data);
  }

  fetchAndRender();
  setInterval(fetchAndRender, 28800000); // 8 часов
})();
